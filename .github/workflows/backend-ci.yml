name: Backend CI

on:
  push:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  smoke-checks:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run backend CI smoke checks
        run: npm run test:ci

      - name: Prepare CI environment
        run: cp .env.ci .env

      - name: Start backend
        run: npm start &

      - name: Wait for backend health
        run: |
          for i in {1..30}; do
            if curl -sf http://127.0.0.1:5000/api/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Backend did not become healthy in time"
          exit 1

      - name: Run critical path integration checks
        run: npm run test:integration:critical
