<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#grad1)"/>
  <!-- Graduation cap body -->
  <polygon points="256,120 420,196 256,272 92,196" fill="white" opacity="0.95"/>
  <!-- Cap board / tassel top -->
  <rect x="228" y="108" width="56" height="16" rx="8" fill="white"/>
  <!-- Left diploma scroll -->
  <rect x="128" y="290" width="56" height="72" rx="8" fill="white" opacity="0.85"/>
  <rect x="136" y="302" width="40" height="4" rx="2" fill="url(#grad1)"/>
  <rect x="136" y="312" width="32" height="4" rx="2" fill="url(#grad1)"/>
  <rect x="136" y="322" width="36" height="4" rx="2" fill="url(#grad1)"/>
  <!-- Center star / spark -->
  <circle cx="256" cy="340" r="30" fill="url(#grad2)"/>
  <text x="256" y="350" text-anchor="middle" font-size="28" font-family="Arial" fill="white">★</text>
  <!-- Right diploma scroll -->
  <rect x="328" y="290" width="56" height="72" rx="8" fill="white" opacity="0.85"/>
  <rect x="336" y="302" width="40" height="4" rx="2" fill="url(#grad1)"/>
  <rect x="336" y="312" width="32" height="4" rx="2" fill="url(#grad1)"/>
  <rect x="336" y="322" width="36" height="4" rx="2" fill="url(#grad1)"/>
  <!-- Tassel rope -->
  <line x1="420" y1="196" x2="420" y2="300" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.8"/>
  <circle cx="420" cy="308" r="14" fill="url(#grad2)"/>
  <!-- App name -->
  <text x="256" y="430" text-anchor="middle" font-size="52" font-weight="700" font-family="'Arial', sans-serif" fill="white" letter-spacing="2">EduNova</text>
</svg>
