version: '3.9'

services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - edunova_mongo_data:/data/db

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - mongodb
    env_file:
      - .env
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/edunova
      - NODE_ENV=production
    ports:
      - "5000:5000"
    volumes:
      - ./uploads:/app/uploads

volumes:
  edunova_mongo_data:
